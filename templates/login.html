{% extends 'base.html' %}
{% block title %}Login — Sunexa Music{% endblock %}

{% block body %}
<div class="auth-page">
  <div class="auth-bg-orbs">
    <div class="orb orb-1"></div>
    <div class="orb orb-2"></div>
    <div class="orb orb-3"></div>
  </div>

  <div class="auth-card">
    <div class="auth-logo">
      <div class="logo-icon"><i class="bi bi-soundwave"></i></div>
      <span class="logo-text">Sunexa</span>
    </div>

    <h2 class="auth-title">Welcome back</h2>
    <p class="auth-sub">Sign in to continue listening</p>

    <form method="POST" action="{{ url_for('login') }}" class="auth-form">
      <div class="field-group">
        <label>Email / Username</label>
        <div class="input-wrap">
          <i class="bi bi-person"></i>
          <input type="text" name="email" placeholder="you@example.com or admin"
                 required autocomplete="username" id="loginInput"
                 oninput="detectAdmin(this.value)"/>
        </div>
      </div>

      <!-- Admin hint (hidden by default) -->
      <div class="admin-hint" id="adminHint" style="display:none">
        <i class="bi bi-shield-lock-fill"></i> Admin login detected
      </div>

      <div class="field-group">
        <label>Password</label>
        <div class="input-wrap">
          <i class="bi bi-lock"></i>
          <input type="password" name="password" placeholder="••••••••"
                 required autocomplete="current-password"/>
          <button type="button" class="eye-btn" onclick="togglePwd(this)">
            <i class="bi bi-eye"></i>
          </button>
        </div>
      </div>

      <button type="submit" class="btn-primary-auth" id="signInBtn">
        Sign In <i class="bi bi-arrow-right"></i>
      </button>
    </form>

    <p class="auth-switch">New to Sunexa? <a href="{{ url_for('signup') }}">Create account</a></p>
  </div>
</div>

<style>
.admin-hint {
  display: flex; align-items: center; gap: .5rem;
  background: rgba(255, 80, 50, .12);
  border: 1px solid rgba(255, 80, 50, .3);
  border-radius: 8px; padding: .5rem .9rem;
  font-size: .82rem; color: #ff7a5c; font-weight: 600;
  animation: fadeIn .25s ease;
}
@keyframes fadeIn { from { opacity:0; transform:translateY(-4px); } to { opacity:1; transform:none; } }
</style>

<script>
function togglePwd(btn) {
  const inp  = btn.parentElement.querySelector('input');
  const icon = btn.querySelector('i');
  inp.type   = inp.type === 'password' ? 'text' : 'password';
  icon.className = inp.type === 'password' ? 'bi bi-eye' : 'bi bi-eye-slash';
}

function detectAdmin(val) {
  const hint = document.getElementById('adminHint');
  const btn  = document.getElementById('signInBtn');
  if (val.trim().toLowerCase() === 'admin') {
    hint.style.display = 'flex';
    btn.innerHTML = '<i class="bi bi-shield-lock-fill"></i> Sign In as Admin';
  } else {
    hint.style.display = 'none';
    btn.innerHTML = 'Sign In <i class="bi bi-arrow-right"></i>';
  }
}
</script>
{% endblock %}
