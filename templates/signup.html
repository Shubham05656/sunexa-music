{% extends 'base.html' %}
{% block title %}Sign Up — Sunexa Music{% endblock %}

{% block body %}
<div class="auth-page">
  <div class="auth-bg-orbs">
    <div class="orb orb-1"></div>
    <div class="orb orb-2"></div>
    <div class="orb orb-3"></div>
  </div>

  <div class="auth-card">
    <div class="auth-logo">
      <div class="logo-icon"><i class="bi bi-soundwave"></i></div>
      <span class="logo-text">Sunexa</span>
    </div>

    <h2 class="auth-title">Create account</h2>
    <p class="auth-sub">Join millions of music lovers</p>

    <form method="POST" action="{{ url_for('signup') }}" class="auth-form">
      <div class="field-group">
        <label>Full Name</label>
        <div class="input-wrap">
          <i class="bi bi-person"></i>
          <input type="text" name="name" placeholder="Your name" required autocomplete="name" />
        </div>
      </div>
      <div class="field-group">
        <label>Email</label>
        <div class="input-wrap">
          <i class="bi bi-envelope"></i>
          <input type="email" name="email" placeholder="you@example.com" required autocomplete="email" />
        </div>
      </div>
      <div class="field-group">
        <label>Password</label>
        <div class="input-wrap">
          <i class="bi bi-lock"></i>
          <input type="password" name="password" placeholder="Min 6 characters" required minlength="6" autocomplete="new-password" />
          <button type="button" class="eye-btn" onclick="togglePwd(this)"><i class="bi bi-eye"></i></button>
        </div>
      </div>
      <button type="submit" class="btn-primary-auth">Create Account <i class="bi bi-arrow-right"></i></button>
    </form>

    <p class="auth-switch">Already have an account? <a href="{{ url_for('login') }}">Sign in</a></p>
  </div>
</div>

<script>
function togglePwd(btn) {
  const inp = btn.parentElement.querySelector('input');
  const icon = btn.querySelector('i');
  if (inp.type === 'password') {
    inp.type = 'text';
    icon.className = 'bi bi-eye-slash';
  } else {
    inp.type = 'password';
    icon.className = 'bi bi-eye';
  }
}
</script>
{% endblock %}
